<html><head><title>Calculator</title><style>body {font-family: Arial, sans-serif;}.calculator {width: 300px;margin: 50px auto;padding: 20px;background-color: #f0f0f0;border: 1px solid #ccc;border-radius: 10px;box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);}#display {width: 100%;height: 40px;margin-bottom: 20px;padding: 10px;font-size: 20px;text-align: right;border: none;}.buttons {display: grid;grid-template-columns: repeat(4, 1fr);gap: 10px;}button {height: 40px;font-size: 18px;background-color: #4CAF50;color: #fff;border: none;border-radius: 5px;cursor: pointer;}button:hover {background-color: #3e8e41;}</style></head><body><div class="calculator"><input type="text" id="display" disabled><div class="buttons"><button onclick="clearDisplay()">C</button><button onclick="backspace()">DEL</button><button onclick="typeNumber(7)">7</button><button onclick="typeNumber(8)">8</button><button onclick="typeNumber(9)">9</button><button onclick="typeOperator('/')">/</button><button onclick="typeNumber(4)">4</button><button onclick="typeNumber(5)">5</button><button onclick="typeNumber(6)">6</button><button onclick="typeOperator('*')">*</button><button onclick="typeNumber(1)">1</button><button onclick="typeNumber(2)">2</button><button onclick="typeNumber(3)">3</button><button onclick="typeOperator('-')">-</button><button onclick="typeNumber(0)">0</button><button onclick="typeDecimal()">.</button><button onclick="calculate()">=</button><button onclick="typeOperator('+')">+</button></div></div><script>let displayValue = '';const display = document.getElementById('display');function typeNumber(num) {displayValue += num.toString();display.value = displayValue;}function typeOperator(op) {displayValue += op.toString();display.value = displayValue;}function typeDecimal() {if (!displayValue.includes('.')) {displayValue += '.';display.value = displayValue;}}function clearDisplay() {displayValue = '';display.value = ''; }function backspace() {displayValue = displayValue.slice(0, -1);display.value = displayValue;}function calculate() {try {display.value = eval(displayValue);displayValue = display.value;} catch (error) {display.value = 'Error';displayValue = '';}}</script></body></html>
