<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AgentFirst - Sign Up</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    [data-theme="light"]{--bg:#f5f5f5;--bg2:white;--border:#ececec;--text:#111827;--text2:#6b7280;--text3:#374151;--input-bg:#fafafa;--input-border:#e5e7eb;--nav-border:#e5e7eb;--btn-icon:☾}
    [data-theme="dark"]{--bg:#0d0d0f;--bg2:#141416;--border:rgba(255,255,255,0.1);--text:#f0ede8;--text2:rgba(240,237,232,0.55);--text3:rgba(240,237,232,0.75);--input-bg:#1c1c1f;--input-border:rgba(255,255,255,0.12);--nav-border:rgba(255,255,255,0.07);--btn-icon:☀️}
    body{font-family:'Inter',sans-serif;background:var(--bg);overflow-x:hidden;color:var(--text);transition:background .3s,color .3s;min-height:100vh;}
    body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(var(--input-border) 1px,transparent 1px);background-size:24px 24px;opacity:0.45;z-index:-2;pointer-events:none;}
    .blur-bg{position:fixed;width:500px;height:500px;background:#ef444418;filter:blur(120px);border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);z-index:-1;pointer-events:none;}
    nav{height:72px;background:var(--bg2);border-bottom:1px solid var(--nav-border);display:flex;align-items:center;justify-content:space-between;padding:0 40px;transition:background .3s,border-color .3s;}
    .logo{font-size:34px;font-family:'Playfair Display',serif;font-weight:700;position:relative;text-decoration:none;color:var(--text);transition:color .3s;}
    .logo::before{content:'•';color:#ef4444;position:absolute;left:-18px;top:-2px;font-size:26px;}
    .nav-right{display:flex;align-items:center;gap:16px;}
    .theme-btn{width:42px;height:42px;border-radius:12px;border:1px solid var(--input-border);background:var(--bg2);cursor:pointer;font-size:18px;transition:all .3s;color:var(--text);}
    .theme-btn:hover{border-color:#ef4444;}
    .signin-btn{padding:12px 22px;border-radius:12px;border:1px solid var(--input-border);background:var(--bg2);cursor:pointer;font-weight:600;transition:.3s;text-decoration:none;color:var(--text);font-size:15px;font-family:'Inter',sans-serif;}
    .signin-btn:hover{background:#ef4444;color:white;border-color:#ef4444;}
    .container{min-height:calc(100vh - 72px);display:flex;justify-content:center;align-items:center;padding:40px 20px;}
    .signup-card{width:100%;max-width:580px;background:var(--bg2);border-radius:32px;padding:50px;border:1px solid var(--border);box-shadow:0 20px 60px rgba(0,0,0,0.08);position:relative;transition:background .3s,border-color .3s;}
    .signup-card::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:70px;height:4px;background:#ef4444;border-radius:20px;}
    .step{text-align:center;color:var(--text2);font-size:14px;margin-bottom:18px;}
    h1{text-align:center;font-size:54px;line-height:1;margin-bottom:12px;font-family:'Playfair Display',serif;color:var(--text);}
    h1 span{color:#ef4444;}
    .subtitle{text-align:center;color:var(--text2);margin-bottom:34px;font-size:16px;}
    .socials{display:flex;gap:14px;margin-bottom:28px;}
    .social-btn{flex:1;height:54px;border-radius:14px;border:1px solid var(--input-border);background:var(--input-bg);font-size:16px;font-weight:600;cursor:pointer;transition:.3s;font-family:'Inter',sans-serif;color:var(--text);}
    .social-btn:hover{transform:translateY(-2px);border-color:#ef4444;}
    .divider{display:flex;align-items:center;gap:12px;margin-bottom:28px;color:var(--text2);font-size:14px;}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--input-border);}
    .row{display:flex;gap:16px;}
    .input-group{margin-bottom:18px;width:100%;}
    label{display:block;margin-bottom:8px;font-size:14px;font-weight:600;color:var(--text3);}
    input[type=text],input[type=email],input[type=password]{width:100%;height:56px;border-radius:14px;border:1px solid var(--input-border);padding:0 18px;font-size:15px;background:var(--input-bg);transition:.3s;font-family:'Inter',sans-serif;color:var(--text);}
    input[type=text]:focus,input[type=email]:focus,input[type=password]:focus{outline:none;border-color:#ef4444;box-shadow:0 0 0 4px rgba(239,68,68,0.12);background:var(--bg2);}
    .strength{margin-top:10px;height:8px;width:100%;border-radius:10px;background:var(--input-border);overflow:hidden;}
    .strength-bar{width:0%;height:100%;background:linear-gradient(to right,#f59e0b,#ef4444);border-radius:10px;transition:width .3s,background .3s;}
    .strength-text{font-size:13px;margin-top:8px;color:#9ca3af;font-weight:600;}
    .checkbox{display:flex;align-items:flex-start;gap:10px;margin:26px 0;font-size:14px;color:var(--text2);}
    .checkbox input{width:18px;height:18px;margin-top:2px;flex-shrink:0;}
    .checkbox a{color:#ef4444;text-decoration:none;font-weight:600;}
    .error-msg{background:#fef2f2;border:1px solid #fecaca;color:#ef4444;padding:12px 16px;border-radius:12px;font-size:14px;margin-bottom:18px;}
    .create-btn{width:100%;height:58px;border:none;border-radius:16px;background:linear-gradient(to right,#ef4444,#dc2626);color:white;font-size:17px;font-weight:700;cursor:pointer;transition:.35s;box-shadow:0 12px 24px rgba(239,68,68,0.25);font-family:'Inter',sans-serif;}
    .create-btn:hover{transform:translateY(-3px);box-shadow:0 18px 32px rgba(239,68,68,0.32);}
    .bottom-text{margin-top:24px;text-align:center;color:var(--text2);font-size:15px;}
    .bottom-text a{color:#ef4444;text-decoration:none;font-weight:700;}
    @media(max-width:640px){nav{padding:0 18px;}.logo{font-size:28px;}.signup-card{padding:32px 24px;border-radius:24px;}h1{font-size:42px;}.row{flex-direction:column;gap:0;}.socials{flex-direction:column;}}
  </style>
</head>
<body>
  <div class="blur-bg"></div>
  <nav>
    <a href="/" class="logo">AgentFirst</a>
    <div class="nav-right">
      <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">☾</button>
      <a href="/login" class="signin-btn">Sign In</a>
    </div>
  </nav>
  <section class="container">
    <div class="signup-card">
      <div class="step">Step 1 of 1 — Create workspace</div>
      <h1>Join <span>AgentFirst</span></h1>
      <div class="subtitle">Start building AI-powered projects in seconds</div>
      {% if error %}
        <div class="error-msg">{{ error }}</div>
      {% endif %}
      <div class="socials">
        <button class="social-btn">🔵 Google</button>
        <button class="social-btn">⚫ GitHub</button>
      </div>
      <div class="divider">or continue with email</div>
      <form action="/signup" method="POST">
        <div class="row">
          <div class="input-group"><label>First Name</label><input type="text" name="firstName" placeholder="John" required></div>
          <div class="input-group"><label>Last Name</label><input type="text" name="lastName" placeholder="Doe"></div>
        </div>
        <div class="input-group"><label>Email Address</label><input type="email" name="email" placeholder="your.email@example.com" required></div>
        <div class="input-group">
          <label>Password</label>
          <input type="password" name="password" id="pw" placeholder="Minimum 8 characters" required oninput="checkStrength(this.value)">
          <div class="strength"><div class="strength-bar" id="sbar"></div></div>
          <div class="strength-text" id="stxt">Enter a password</div>
        </div>
        <div class="input-group"><label>Confirm Password</label><input type="password" name="confirmPassword" placeholder="Confirm your password" required></div>
        <div class="checkbox">
          <input type="checkbox" required>
          <div>I agree to the <a href="#">Terms</a> and <a href="#">Privacy Policy</a></div>
        </div>
        <button type="submit" class="create-btn">Create Free Account →</button>
      </form>
      <div class="bottom-text">Already building with AgentFirst? <a href="/login">Sign in</a></div>
    </div>
  </section>
  <script>
    // Init theme
    const saved = localStorage.getItem('af-theme') || 'light';
    document.documentElement.setAttribute('data-theme', saved);
    document.getElementById('themeBtn').textContent = saved === 'dark' ? '☀️' : '☾';

    function toggleTheme() {
      const cur = document.documentElement.getAttribute('data-theme');
      const next = cur === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('af-theme', next);
      document.getElementById('themeBtn').textContent = next === 'dark' ? '☀️' : '☾';
    }

    function checkStrength(v) {
      let s = 0;
      if (v.length >= 8) s++;
      if (/[A-Z]/.test(v)) s++;
      if (/[0-9]/.test(v)) s++;
      if (/[^A-Za-z0-9]/.test(v)) s++;
      const L = [{w:'0%',c:'#9ca3af',t:'Enter a password'},{w:'25%',c:'#ef4444',t:'Weak'},{w:'50%',c:'#f59e0b',t:'Fair'},{w:'75%',c:'#3b82f6',t:'Good'},{w:'100%',c:'#22c55e',t:'Strong ✓'}];
      const l = L[s] || L[0];
      const b = document.getElementById('sbar');
      b.style.width = l.w; b.style.background = l.c;
      const t = document.getElementById('stxt');
      t.style.color = l.c; t.textContent = l.t;
    }
  </script>
</body>
</html>
