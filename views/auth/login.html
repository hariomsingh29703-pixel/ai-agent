<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — AgentFirst</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  [data-theme="dark"] {
    --bg:#0d0d0f; --bg2:#141416; --bg3:#1c1c1f;
    --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.12); --border3:rgba(255,255,255,0.22);
    --text:#f0ede8; --text2:rgba(240,237,232,0.55); --text3:rgba(240,237,232,0.3);
    --nav-bg:rgba(13,13,15,0.80); --shadow:0 2px 40px rgba(0,0,0,0.5); --input-bg:#1c1c1f;
  }
  [data-theme="light"] {
    --bg:#fafaf8; --bg2:#ffffff; --bg3:#f2f1ee;
    --border:rgba(0,0,0,0.07); --border2:rgba(0,0,0,0.12); --border3:rgba(0,0,0,0.22);
    --text:#111110; --text2:rgba(17,17,16,0.55); --text3:rgba(17,17,16,0.35);
    --nav-bg:rgba(250,250,248,0.85); --shadow:0 2px 40px rgba(0,0,0,0.08); --input-bg:#f2f1ee;
  }
  :root { --accent:#dc2626; --accent2:#ef4444; --serif:'Instrument Serif',Georgia,serif; --sans:'DM Sans',system-ui,sans-serif; }
  html { scroll-behavior:smooth; }
  body { background:var(--bg); color:var(--text); font-family:var(--sans); font-size: 18.3px; line-height:1.6; min-height:100vh; -webkit-font-smoothing:antialiased; transition:background 0.35s,color 0.35s; display:flex; flex-direction:column; }
  nav { position:fixed; top:0; left:0; right:0; z-index:100; display:flex; align-items:center; justify-content:space-between; padding:0 32px; height:60px; background:var(--nav-bg); backdrop-filter:blur(20px); border-bottom:0.5px solid var(--border); transition:background 0.35s; }
  .logo { font-family:var(--serif); font-size: 34px; font-weight: 900; color:var(--text); letter-spacing:-0.02em; display:flex; align-items:center; gap:8px; text-decoration:none; }
  .logo-dot { width:8px; height:8px; border-radius:50%; background:var(--accent); }
  .nav-right { display:flex; align-items:center; gap:10px; }
  .theme-toggle { width:38px; height:38px; border-radius:10px; border:0.5px solid var(--border2); background:var(--bg3); cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.2s; color:var(--text2); }
  .theme-toggle:hover { border-color:var(--border3); color:var(--text); transform:rotate(15deg); }
  .btn-ghost { padding:10px 24px; border-radius:8px; font-size: 22px !important; font-family:var(--sans); background:transparent; color:var(--text2); border:0.5px solid var(--border2); cursor:pointer; transition:all 0.2s; text-decoration:none; display:inline-block; font-weight:900 !important; }
  .btn-ghost:hover { color:var(--text); border-color:var(--border3); }
  .page { flex:1; display:flex; align-items:center; justify-content:center; padding:80px 24px 40px; position:relative; overflow:hidden; }
  .page::before { content:''; position:absolute; inset:0; z-index:0; background:radial-gradient(ellipse 700px 500px at 50% 30%,rgba(220,38,38,0.11) 0%,transparent 70%),radial-gradient(ellipse 400px 400px at 15% 70%,rgba(220,38,38,0.04) 0%,transparent 60%),radial-gradient(ellipse 400px 400px at 85% 60%,rgba(220,38,38,0.04) 0%,transparent 60%); pointer-events:none; }
  [data-theme="light"] .page::before { opacity:0.7; }
  .page::after { content:''; position:absolute; inset:0; z-index:0; background-image:radial-gradient(circle,var(--border2) 1px,transparent 1px); background-size:28px 28px; pointer-events:none; opacity:0.4; }
  .card { position:relative; z-index:1; width:100%; max-width:520px; background:var(--bg2); border:0.5px solid var(--border2); border-radius:24px; padding:40px 36px 36px; box-shadow:var(--shadow); animation:fadeUp 0.5s ease both; }
  .card-accent-bar { position:absolute; top:0; left:50%; transform:translateX(-50%); width:60px; height:3px; border-radius:0 0 4px 4px; background:var(--accent); }
  .card-brand { display:flex; flex-direction:column; align-items:center; margin-bottom:28px; gap:6px; }
  .card-title { font-family:var(--serif); font-size: 62px; font-style:italic; letter-spacing:-0.02em; color:var(--text); text-align:center; font-weight: 900; line-height:1.1; }
  .card-title em { color:var(--accent); font-style:normal; }
  .card-sub { font-weight: 700; font-size: 22px; color:var(--text3); text-align:center; margin-top:5px; }
  .divider-line { border:none; border-top:0.5px solid var(--border); margin:24px 0; }
  .field { margin-bottom:18px; }
  .field label { display:block; font-size: 15.2px; font-weight:600; color:var(--text2); letter-spacing:0.03em; margin-bottom:7px; }
  .input-wrap { display:flex; align-items:center; gap:10px; background:var(--input-bg); border:0.5px solid var(--border2); border-radius:10px; padding:0 14px; transition:border-color 0.2s,box-shadow 0.2s; }
  .input-wrap:focus-within { border-color:rgba(220,38,38,0.45); box-shadow:0 0 0 3px rgba(220,38,38,0.08); }
  .input-wrap svg { width:15px; height:15px; flex-shrink:0; stroke:var(--text3); fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; transition:stroke 0.2s; }
  .input-wrap:focus-within svg { stroke:var(--accent); }
  .input-wrap input { flex:1; background:transparent; border:none; outline:none; color:var(--text); font-size: 17.1px; font-family:var(--sans); padding:12px 0; }
  .input-wrap input::placeholder { color:var(--text3); }
  .eye-btn { background:none; border:none; cursor:pointer; padding:0; display:flex; color:var(--text3); transition:color 0.2s; }
  .eye-btn:hover { color:var(--text2); }
  .eye-btn svg { width:15px; height:15px; stroke:currentColor; fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }
  .forgot-row { display:flex; justify-content:flex-end; margin-top:-10px; margin-bottom:22px; }
  .forgot-row a { font-size: 15.2px; color:var(--text3); text-decoration:none; transition:color 0.2s; }
  .forgot-row a:hover { color:var(--accent); }
  .btn-submit { width:100%; padding:13px; background:var(--accent); color:#fff; border:none; border-radius:10px; font-size: 17.7px; font-weight:600; font-family:var(--sans); cursor:pointer; transition:all 0.2s; display:flex; align-items:center; justify-content:center; gap:8px; letter-spacing:0.01em; }
  .btn-submit svg { width:15px; height:15px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
  .btn-submit:hover { background:var(--accent2); transform:translateY(-1px); box-shadow:0 6px 20px rgba(220,38,38,0.3); }
  .btn-submit:active { transform:translateY(0); }
  .or-divider { display:flex; align-items:center; gap:12px; margin:22px 0; color:var(--text3); font-size: 14.6px; }
  .or-divider::before, .or-divider::after { content:''; flex:1; border-top:0.5px solid var(--border2); }
  .oauth-row { display:flex; gap:10px; }
  .btn-oauth { flex:1; display:flex; align-items:center; justify-content:center; gap:8px; padding:10px 14px; border-radius:10px; background:var(--bg3); border:0.5px solid var(--border2); color:var(--text2); font-size: 15.9px; font-weight:500; font-family:var(--sans); cursor:pointer; transition:all 0.2s; text-decoration:none; }
  .btn-oauth:hover { border-color:var(--border3); color:var(--text); }
  .btn-oauth svg { width:16px; height:16px; flex-shrink:0; }
  .signup-row { text-align:center; margin-top:24px; font-size: 22px !important; color:var(--text3); font-weight:800 !important; }
  .signup-row a { color:var(--accent); text-decoration:none; font-size:22px !important; font-weight:900 !important; transition:color 0.2s; }
  .signup-row a:hover { color:var(--accent2); }
  .error-msg { background:rgba(220,38,38,0.1); border:0.5px solid rgba(220,38,38,0.3); color:#ef4444; padding:10px 14px; border-radius:10px; font-size: 15.9px; margin-bottom:16px; display:none; }
  .error-msg.show { display:block; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>
<nav>
  <a href="/" class="logo"><div class="logo-dot"></div>AgentFirst</a>
  <div class="nav-right">
    <button class="theme-toggle" onclick="toggleTheme()">
      <svg id="icon-sun" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/>
        <line x1="4.22" y1="4.22" x2="6.34" y2="6.34"/><line x1="17.66" y1="17.66" x2="19.78" y2="19.78"/>
        <line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/>
        <line x1="4.22" y1="19.78" x2="6.34" y2="17.66"/><line x1="17.66" y1="6.34" x2="19.78" y2="4.22"/>
      </svg>
      <svg id="icon-moon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="display:none">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>
    <a href="/signup" class="btn-ghost">Sign Up</a>
  </div>
</nav>

<div class="page">

  <div class="card">
    <div class="card-accent-bar"></div>
    <div class="card-brand">
      <div class="card-title">Welcome <em>back</em></div>
      <div class="card-sub">Sign in to your AgentFirst workspace</div>
    </div>
    <hr class="divider-line">

    {% if error %}
      <div class="error-msg show">{{ error }}</div>
    {% endif %}

    <div class="oauth-row">
      <a href="#" class="btn-oauth">
        <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Google
      </a>
      <a href="#" class="btn-oauth">
        <svg viewBox="0 0 24 24" fill="var(--text2)"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.342-3.369-1.342-.454-1.155-1.11-1.462-1.11-1.462-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0 1 12 6.836c.85.004 1.705.115 2.504.337 1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.163 22 16.418 22 12c0-5.523-4.477-10-10-10z"/></svg>
        GitHub
      </a>
    </div>

    <div class="or-divider">or continue with email</div>

    <form action="/login" method="POST" id="login-form">
      <div class="field">
        <label>Email Address</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 7 10 7 10-7"/></svg>
          <input type="email" name="email" placeholder="your.email@example.com" autocomplete="email" required>
        </div>
      </div>
      <div class="field">
        <label>Password</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input type="password" name="password" placeholder="Enter your password" id="pw-input" autocomplete="current-password" required>
          <button class="eye-btn" onclick="togglePw()" type="button">
            <svg id="eye-open" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg id="eye-closed" viewBox="0 0 24 24" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
      </div>
      <div class="forgot-row"><a href="#">Forgot password?</a></div>
      <button type="submit" class="btn-submit" id="submit-btn">
        Sign In
        <svg viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
      </button>
    </form>

    <div class="signup-row">Don't have an account? <a href="/signup">Sign up free</a></div>
  </div>

</div>

<footer class="page-footer">© 2025 AgentFirst &nbsp;·&nbsp; <a href="#">Privacy</a> &nbsp;·&nbsp; <a href="#">Terms</a></footer>

<script>
  function toggleTheme() {
    const html = document.documentElement;
    const isDark = html.dataset.theme === 'dark';
    html.dataset.theme = isDark ? 'light' : 'dark';
    document.getElementById('icon-sun').style.display  = isDark ? 'none' : '';
    document.getElementById('icon-moon').style.display = isDark ? ''     : 'none';
  }
  function togglePw() {
    const inp = document.getElementById('pw-input');
    const isHidden = inp.type === 'password';
    inp.type = isHidden ? 'text' : 'password';
    document.getElementById('eye-open').style.display   = isHidden ? 'none' : '';
    document.getElementById('eye-closed').style.display = isHidden ? ''     : 'none';
  }
  document.getElementById('login-form').addEventListener('submit', function() {
    const btn = document.getElementById('submit-btn');
    btn.innerHTML = 'Signing in… <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>';
    btn.style.opacity = '0.8';
    btn.disabled = true;
  });
</script>
</body>
</html>
